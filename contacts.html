<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Контакти</title>
    <style>
        form { 
            display: flex;
            align-content: center;
            flex-wrap: wrap;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
        }

        form label {
            margin-top: 10px;
        }

        form input{
            margin-top: 5px;
            padding: 8px;
            width: 300px;
        }

        form textarea {
            margin-top: 5px;
            padding: 8px;
            width: 300px;
        }

        form button{
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #333;
            color: white;
            border: none;
            cursor: pointer;
        }
        form button:hover {
            background-color: #555;
        }
    </style>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <nav><a href="index.html">Назад на головну</a></nav>
    <h2 style="text-align: center;">Зворотний зв'язок</h2>
    
    <form action="#">
        <label for="fname">Ваше ім'я:</label>
        <input type="text" id="fname" name="firstname" placeholder="Ім'я..." required>

        <label for="email">Ваш Email:</label>
        <input type="email" id="email" name="email" placeholder="example@mail.com">

        <label for="subject">Тема звернення:</label>
        <select id="subject" name="subject">
            <option value="feedback">Відгук про сайт</option>
            <option value="error">Повідомити про помилку</option>
            <option value="ads">Реклама</option>
        </select>

        <label for="msg">Повідомлення:</label>
        <textarea id="msg" name="message" style="height:100px"></textarea>

        <input type="submit" value="Надіслати повідомлення">
        <button type="reset">Очистити все</button>
    </form>
</body>
</html>
